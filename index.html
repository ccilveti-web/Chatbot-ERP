<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1A2441;
    --blue: #2f4daa;
    --yellow: #f9b82c;
    --gray-bg: #f4f5f8;
    --gray-light: #e8eaf0;
    --gray-mid: #c2c7d6;
    --text: #1A2441;
    --white: #ffffff;
    --green: #22c55e;
    --red: #ef4444;
  }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--navy);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(26,36,65,0.18);
    z-index: 10;
  }

  .wordmark {
    font-size: 28px;
    font-weight: 900;
    color: var(--yellow);
    letter-spacing: -1px;
    line-height: 1;
  }

  .topbar-right {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* ── ERP CHIPS ── */
  .chips-bar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-light);
    padding: 10px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
    align-items: center;
  }

  .chips-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-mid);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-right: 4px;
  }

  .chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all .18s;
    background: var(--gray-bg);
    color: var(--navy);
  }

  .chip:hover, .chip.active {
    background: var(--blue);
    color: var(--white);
    border-color: var(--blue);
  }

  .chip.all.active {
    background: var(--navy);
    border-color: var(--navy);
  }

  /* ── CHAT LAYOUT ── */
  .chat-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--gray-mid) transparent;
  }

  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: var(--gray-mid); border-radius: 3px; }

  /* ── BUBBLES ── */
  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .msg-row.user {
    flex-direction: row-reverse;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--yellow);
    color: var(--navy);
    font-weight: 900;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
  }

  .msg-row.bot .bubble {
    background: var(--white);
    border-radius: 4px 18px 18px 18px;
    box-shadow: 0 1px 6px rgba(26,36,65,0.08);
    color: var(--text);
  }

  .msg-row.user .bubble {
    background: var(--blue);
    color: var(--white);
    border-radius: 18px 4px 18px 18px;
  }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    padding: 10px 16px;
    display: none;
  }

  .progress-wrap.visible { display: flex; align-items: center; gap: 10px; }

  .progress-bar-outer {
    flex: 1;
    height: 5px;
    background: var(--gray-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--yellow));
    border-radius: 3px;
    animation: progress-anim 1.2s ease-in-out infinite;
    width: 40%;
  }

  @keyframes progress-anim {
    0%   { transform: translateX(-100%); width: 50%; }
    50%  { width: 70%; }
    100% { transform: translateX(200%); width: 50%; }
  }

  .progress-text {
    font-size: 12px;
    color: var(--blue);
    font-weight: 700;
    white-space: nowrap;
  }

  /* ── CARDS ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }

  .partner-card {
    background: var(--white);
    border-radius: 14px;
    border: 1.5px solid var(--gray-light);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: box-shadow .18s, border-color .18s;
  }

  .partner-card:hover {
    box-shadow: 0 4px 18px rgba(47,77,170,0.13);
    border-color: var(--blue);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-name {
    font-size: 16px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.2;
  }

  .card-erp {
    font-size: 11px;
    color: var(--blue);
    font-weight: 700;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .tier-badge {
    flex-shrink: 0;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .tier-1 { background: #f9b82c22; color: #b8860b; border: 1.5px solid #f9b82c88; }
  .tier-2 { background: #2f4daa18; color: var(--blue); border: 1.5px solid #2f4daa44; }
  .tier-3 { background: #6b728018; color: #374151; border: 1.5px solid #6b728044; }
  .tier-4 { background: #e5e7eb; color: #6b7280; border: 1.5px solid #d1d5db; }
  .tier-5 { background: #fee2e2; color: #b91c1c; border: 1.5px solid #fca5a5; }

  .card-advantage {
    font-size: 12.5px;
    color: #4b5563;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }

  .pill-dcto {
    background: #fffbeb;
    color: #92400e;
    border: 1.5px solid #f9b82c;
  }

  .pill-integ {
    background: #f0fdf4;
    color: #166534;
    border: 1.5px solid #86efac;
  }

  .pill-no-integ {
    background: #fef2f2;
    color: #991b1b;
    border: 1.5px solid #fca5a5;
  }

  .pill-colabs {
    background: var(--gray-bg);
    color: #374151;
    border: 1.5px solid var(--gray-light);
  }

  .pill-industria {
    background: #eff6ff;
    color: #1d4ed8;
    border: 1.5px solid #bfdbfe;
  }

  .card-contact {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-top: 6px;
    border-top: 1px solid var(--gray-light);
  }

  .contact-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #374151;
  }

  .contact-icon {
    font-size: 13px;
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }

  .contact-val {
    color: #374151;
    word-break: break-all;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 2px;
  }

  .btn-form {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    background: var(--blue);
    color: var(--white);
    text-decoration: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 700;
    transition: background .18s;
  }

  .btn-form:hover { background: var(--navy); }

  .btn-site {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    background: var(--gray-bg);
    color: var(--navy);
    text-decoration: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 700;
    border: 1.5px solid var(--gray-light);
    transition: border-color .18s;
  }

  .btn-site:hover { border-color: var(--blue); color: var(--blue); }

  /* ── COPY FORMAT BOX ── */
  .copy-box {
    background: #f8faff;
    border: 1.5px solid var(--blue);
    border-radius: 12px;
    padding: 14px 16px;
    margin-top: 10px;
    font-size: 12.5px;
    line-height: 1.6;
    color: #1e293b;
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
  }

  .copy-box-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .copy-box-title {
    font-size: 11px;
    font-weight: 800;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .btn-copy {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--yellow);
    color: var(--navy);
    border: none;
    border-radius: 7px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
    font-family: 'Nunito Sans', sans-serif;
    transition: background .18s;
  }

  .btn-copy:hover { background: #e5a81e; }
  .btn-copy.copied { background: #22c55e; color: white; }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 12px 0 16px;
    flex-shrink: 0;
  }

  .quick-prompts {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .qp-btn {

    border-radius: 20px;
    background: var(--white);
    border: 1.5px solid var(--gray-light);
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    cursor: pointer;
    font-family: 'Nunito Sans', sans-serif;
    transition: all .15s;
    white-space: nowrap;
  }

  .qp-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    background: #eff4ff;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-field {
    flex: 1;
    background: var(--white);
    border: 1.5px solid var(--gray-light);
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: 'Nunito Sans', sans-serif;
    color: var(--text);
    outline: none;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    transition: border-color .18s;
    line-height: 1.45;
  }

  .input-field:focus { border-color: var(--blue); }
  .input-field::placeholder { color: var(--gray-mid); }

  .btn-send {
    background: var(--blue);
    color: var(--white);
    border: none;
    border-radius: 12px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .18s;
    font-size: 20px;

  .btn-send:hover { background: var(--navy); }
  .btn-send:disabled { background: var(--gray-mid); cursor: not-allowed; }

  /* ── TYPING DOTS ── */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 6px 4px;
  }

  .typing span {
    width: 8px;
    height: 8px;
    background: var(--gray-mid);
    border-radius: 50%;
    animation: bounce .9s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-7px); }
  }

  /* ── MISC ── */
  .intro-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 10px;
  }

  .intro-chip {
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--gray-bg);
    border: 1.5px solid var(--gray-light);
    font-size: 12px;
    font-weight: 700;
    color: var(--navy);
    cursor: pointer;
    transition: all .15s;
  }

  .intro-chip:hover {
    background: var(--yellow);
    border-color: var(--yellow);
    color: var(--navy);
  }

  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr; }
    .bubble { max-width: 90%; }
    .topbar-right { display: none; }
  }
</style>
</head>

// =============================================
// LÓGICA DE RECOMENDACIÓN
// =============================================

let activeFilter = 'all';

function filterChip(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function detectCategory(text) {
  const t = text.toLowerCase();
  const hasOdoo = /odoo|open\s?solutions|konos|loyalle|bmya|kpb|mobilize/i.test(text);
  const hasSAP = /sap|g1ntegra|hirofuse|assap|dot\s?vyv|h&co/i.test(text);
  const hasOracle = /oracle|netsuite|net\s?suite/i.test(text);
  const hasDynamics = /dynamics|microsoft|d365|business\s?central/i.test(text);
  const hasPequenos = /peque[ñn]|pyme|startup|chico|simple|barato|chipax|clay|matika|parrotfy|maxxa|ia\s+erp/i.test(text);
  const hasMedida = /medida|desarrollo|tcit|tuxpan|integrac|custom|personaliz/i.test(text);

  if (hasOdoo) return 'ODOO';
  if (hasSAP) return 'SAP B1';
  if (hasOracle) return 'Oracle Netsuite';
  if (hasDynamics) return 'Microsoft Dynamics';
  if (hasMedida) return 'Desarrollo a Medida';
  if (hasPequenos) return 'Pequeños';

  // Inferir por contexto
  const colabs = extractColabs(text);
  if (colabs !== null) {
    if (colabs <= 80) return 'Pequeños';
    if (colabs <= 300) return 'ODOO';
    return 'SAP B1';
  }

  const hasRetail = /retail|tienda|punto de venta|pos/i.test(t);
  if (hasRetail) return 'ODOO';

  const hasPublico = /p[uú]blico|gobierno|licitac/i.test(t);
  if (hasPublico) return 'Pequeños';

  const hasLegal = /legal|financ|compliance|tribut/i.test(t);
  if (hasLegal) return 'ODOO';

  const hasBig = /grande|corporat|enterprise|multinacional|1000|500\+/i.test(t);
  if (hasBig) return 'SAP B1';

  return null; // sin categoría clara
}

function extractColabs(text) {
  const m = text.match(/(\d+)\s*(colaboradores|colabs|empleados|personas|trabajadores)/i);
  if (m) return parseInt(m[1]);
  return null;
}

function getRecommendations(userText, forcedCat) {
  const cat = forcedCat || detectCategory(userText);
  const pool = cat ? PARTNERS.filter(p => p.categoria === cat) : PARTNERS;

  // Ordenar por tier (menor = mejor), luego activos primero
  const sorted = [...pool].sort((a, b) => {
    const ta = a.tier || 99;
    const tb = b.tier || 99;
    if (ta !== tb) return ta - tb;
    const ca = a.cluster === 'Activo' ? 0 : a.cluster === 'Firma' ? 1 : 2;
    const cb = b.cluster === 'Activo' ? 0 : b.cluster === 'Firma' ? 1 : 2;
    return ca - cb;
  });

  return { recs: sorted.slice(0, 3), category: cat };
}

function tierLabel(n) {
  if (!n) return '';
  const labels = { 1: '⭐ Tier 1', 2: '🥈 Tier 2', 3: '🥉 Tier 3', 4: 'Tier 4', 5: 'Tier 5' };
  return labels[n] || `Tier ${n}`;
}

function precioLabel(p) {
  if (!p) return '';
  const map = { '$': 'Económico', '$$': 'Moderado', '$$$': 'Premium', '$$$$': 'Enterprise', '$$$$$': 'Alto' };
  return (map[p] || p) + ' ' + p;
}

// =============================================
// GENERAR FORMATO CHAT GOOGLE PARA COPIAR
// =============================================
function buildCopyText(recs, categoria) {
  const catLabel = categoria || 'ERP';
  let text = `🤖 *Recomendación ERP Buk — ${catLabel}*\n\n`;

  recs.forEach((p, i) => {
    const num = ['1️⃣', '2️⃣', '3️⃣'][i];
    text += `${num} *${p.partner}* ${p.tier === 1 ? '⭐' : p.tier === 2 ? '🥈' : ''}\n`;
    text += `📌 ERP: ${p.erp}\n`;
    if (p.ventaja) text += `✅ ${p.ventaja.substring(0, 180)}${p.ventaja.length > 180 ? '...' : ''}\n`;
    if (p.dcto) text += `🏷️ Dcto: ${p.dcto}\n`;
    if (p.integracion) text += `🔗 Tiene integración con Buk\n`;
    if (p.colabs) text += `👥 Colabs recomendados: ${p.colabs}\n`;
    if (p.industria) text += `🏭 Industria: ${p.industria}\n`;
    if (p.contacto) text += `👤 Contacto: ${p.contacto}\n`;
    if (p.celular) text += `📱 ${p.celular}\n`;
    if (p.correo) text += `📧 ${p.correo}\n`;
    if (p.form) text += `📝 Form derivación: ${p.form}\n`;
    if (p.microsite) text += `🌐 Microsite: ${p.microsite}\n`;
    if (p.sitio) text += `🔗 Sitio: ${p.sitio}\n`;
    text += '\n';
  });

  return text.trim();
}

// =============================================
// RENDERIZADO DE CARDS
// =============================================
function renderCards(recs, categoria) {
  const grid = document.createElement('div');
  grid.className = 'cards-grid';

  recs.forEach(p => {
    const card = document.createElement('div');
    card.className = 'partner-card';

    const tierN = p.tier || 0;
    const tierClass = tierN >= 1 && tierN <= 5 ? `tier-${tierN}` : 'tier-3';

    let html = `
      <div class="card-header">
        <div>
          <div class="card-name">${p.partner}</div>
          <div class="card-erp">${p.erp}</div>
        </div>
        ${p.tier ? `<span class="tier-badge ${tierClass}">${tierLabel(p.tier)}</span>` : ''}
      </div>
      ${p.ventaja ? `<div class="card-advantage">${p.ventaja}</div>` : ''}
      <div class="card-pills">
        ${p.integracion ? '<span class="pill pill-integ">✅ Integración Buk</span>' : '<span class="pill pill-no-integ">Sin integración</span>'}
        ${p.dcto ? `<span class="pill pill-dcto">🏷️ ${p.dcto}</span>` : ''}
        ${p.colabs ? `<span class="pill pill-colabs">👥 ${p.colabs} colabs</span>` : ''}
        ${p.industria ? `<span class="pill pill-industria">🏭 ${p.industria}</span>` : ''}
        ${p.precio ? `<span class="pill pill-colabs">${precioLabel(p.precio)}</span>` : ''}
      </div>
      <div class="card-contact">
        ${p.contacto ? `<div class="contact-line"><span class="contact-icon">👤</span><span class="contact-val">${p.contacto}</span></div>` : ''}
        ${p.celular ? `<div class="contact-line"><span class="contact-icon">📱</span><span class="contact-val">${p.celular}</span></div>` : ''}
        ${p.correo ? `<div class="contact-line"><span class="contact-icon">📧</span><span class="contact-val">${p.correo}</span></div>` : ''}
      </div>
      <div class="card-actions">
        ${p.form ? `<a class="btn-form" href="${p.form}" target="_blank">📝 Form Derivación</a>` : ''}
        ${p.microsite ? `<a class="btn-site" href="${p.microsite}" target="_blank">🌐 Microsite</a>` : (p.sitio ? `<a class="btn-site" href="${p.sitio}" target="_blank">🌐 Sitio web</a>` : '')}
      </div>
    `;

    card.innerHTML = html;
    grid.appendChild(card);
  });

  return grid;
}

// CHAT ENGINE
// =============================================
const messagesEl = document.getElementById('messages');
const progressWrap = document.getElementById('progressWrap');
let isLoading = false;

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, content, isHTML = false) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = 'B';
    row.appendChild(av);
  }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (isHTML) {
    bubble.appendChild(content);
  } else {
    bubble.innerHTML = content.replace(/\n/g, '<br>');
  }

  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollBottom();
  return bubble;
}

function showProgress(show) {
  progressWrap.classList.toggle('visible', show);
}

function buildBotResponse(userText, forcedCat) {
  const { recs, category } = getRecommendations(userText, forcedCat);

  const wrap = document.createElement('div');

  if (recs.length === 0) {
    wrap.innerHTML = '😕 No encontré partners que coincidan con esa búsqueda. Intenta ser más específico o elige un chip de ERP arriba.';
    return wrap;
  }

  const catName = category || 'ERP';
  const catEmojis = {
    'ODOO': '🔵 Odoo',
    'SAP B1': '🟠 SAP B1',
    'Oracle Netsuite': '🟣 Oracle NetSuite',
    'Microsoft Dynamics': '⚪ Microsoft Dynamics',
    'Pequeños': '🟢 ERPs Pequeños',
    'Desarrollo a Medida': '🛠️ Desarrollo a Medida'
  };

  const intro = document.createElement('p');
  intro.style.marginBottom = '4px';
  intro.innerHTML = `Aquí mis <strong>${recs.length} recomendaciones</strong> para <strong>${catEmojis[catName] || catName}</strong>, ordenadas por Tier Estratégico:`;
  wrap.appendChild(intro);

  const cards = renderCards(recs, catName);
  wrap.appendChild(cards);

  // Copy box
  const copyText = buildCopyText(recs, catName);
  const copyDiv = document.createElement('div');
  copyDiv.className = 'copy-box';
  copyDiv.innerHTML = `
    <div class="copy-box-header">
      <span class="copy-box-title">📋 Formato para copiar en Google Chat</span>
      <button class="btn-copy" id="btnCopy_${Date.now()}">📋 Copiar</button>
    </div>
    <div id="copyContent_${Date.now()}" style="font-family: monospace; font-size:12px; white-space:pre-wrap;">${escapeHtml(copyText)}</div>
  `;
  wrap.appendChild(copyDiv);

  // Attach copy event
  setTimeout(() => {
    const btn = copyDiv.querySelector('.btn-copy');
    const contentDiv = copyDiv.querySelector('[id^="copyContent_"]');
    if (btn) {
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(copyText).then(() => {
          btn.textContent = '✅ Copiado!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = '📋 Copiar'; btn.classList.remove('copied'); }, 2000);
        }).catch(() => {
          const ta = document.createElement('textarea');
          ta.value = copyText;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          btn.textContent = '✅ Copiado!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = '📋 Copiar'; btn.classList.remove('copied'); }, 2000);
        });
      });
    }
  }, 100);

  return wrap;
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function sendMessage(forcedText) {
  if (isLoading) return;
  const inp = document.getElementById('userInput');
  const text = forcedText || inp.value.trim();
  if (!text) return;

  if (!forcedText) inp.value = '';
  inp.style.height = 'auto';

  addMessage('user', text);
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showProgress(true);

  // Simulate thinking
  await new Promise(r => setTimeout(r, 800 + Math.random() * 500));

  showProgress(false);
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;

  // Use active chip filter if set
  const cat = activeFilter !== 'all' ? activeFilter : null;
  const content = buildBotResponse(text, cat);
  addMessage('bot', content, true);
}

function sendQuick(text) {
  sendMessage(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
